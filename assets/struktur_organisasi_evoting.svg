<svg width="100%" viewBox="0 0 600 480" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family:'Segoe UI',system-ui,sans-serif">
<title>Struktur Organisasi E-Voting Kelurahan</title>
<desc>Diagram hierarki struktur organisasi sistem e-voting tingkat kelurahan</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="600" height="480" rx="12" fill="#1a1a2e"/>

<!-- Title -->
<text x="300" y="30" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="600">Struktur Organisasi E-Voting Kelurahan</text>

<!-- Level 0: Lurah -->
<rect x="210" y="50" width="180" height="50" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
<text x="300" y="70" text-anchor="middle" fill="#cecbf6" font-size="13" font-weight="500">Lurah / Kepala Desa</text>
<text x="300" y="86" text-anchor="middle" fill="#afa9ec" font-size="11">Penanggung jawab utama</text>

<!-- Lines to Level 1 -->
<line x1="255" y1="100" x2="120" y2="150" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>
<line x1="300" y1="100" x2="300" y2="150" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>
<line x1="345" y1="100" x2="480" y2="150" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Level 1: Panitia, Operator, Saksi -->
<rect x="30" y="150" width="180" height="50" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="120" y="170" text-anchor="middle" fill="#9fe1cb" font-size="13" font-weight="500">Panitia Pemilihan</text>
<text x="120" y="186" text-anchor="middle" fill="#5dcaa5" font-size="11">Koordinasi & DPT</text>

<rect x="210" y="150" width="180" height="50" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="300" y="170" text-anchor="middle" fill="#9fe1cb" font-size="13" font-weight="500">Operator Sistem</text>
<text x="300" y="186" text-anchor="middle" fill="#5dcaa5" font-size="11">Admin IT & perangkat</text>

<rect x="390" y="150" width="180" height="50" rx="8" fill="#63380a" stroke="#ef9f27" stroke-width="0.5"/>
<text x="480" y="170" text-anchor="middle" fill="#fac775" font-size="13" font-weight="500">Saksi Kandidat</text>
<text x="480" y="186" text-anchor="middle" fill="#ef9f27" font-size="11">Pengawas independen</text>

<!-- Lines to Level 2 -->
<line x1="120" y1="200" x2="200" y2="270" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Level 2: Petugas TPS -->
<rect x="120" y="270" width="220" height="50" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="230" y="290" text-anchor="middle" fill="#b5d4f4" font-size="13" font-weight="500">Petugas TPS (per RT/RW)</text>
<text x="230" y="306" text-anchor="middle" fill="#85b7eb" font-size="11">Verifikasi KTP warga</text>

<!-- Line to Level 3 -->
<line x1="230" y1="320" x2="300" y2="380" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Level 3: Pemilih -->
<rect x="130" y="380" width="340" height="50" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="300" y="400" text-anchor="middle" fill="#d3d1c7" font-size="13" font-weight="500">Pemilih (Warga Kelurahan Terdaftar)</text>
<text x="300" y="416" text-anchor="middle" fill="#b4b2a9" font-size="11">Cek KTP → pilih kandidat → selesai</text>

<!-- Legend -->
<rect x="20" y="445" width="560" height="30" rx="6" fill="none" stroke="#dedcd1" stroke-width="0.3" opacity="0.2"/>
<rect x="36" y="454" width="10" height="10" rx="2" fill="#3c3489"/>
<text x="52" y="464" fill="#c2c0b6" font-size="11">Penanggung jawab</text>
<rect x="170" y="454" width="10" height="10" rx="2" fill="#085041"/>
<text x="186" y="464" fill="#c2c0b6" font-size="11">Pelaksana teknis</text>
<rect x="296" y="454" width="10" height="10" rx="2" fill="#63380a"/>
<text x="312" y="464" fill="#c2c0b6" font-size="11">Pengawas</text>
<rect x="390" y="454" width="10" height="10" rx="2" fill="#0c447c"/>
<text x="406" y="464" fill="#c2c0b6" font-size="11">Operasional TPS</text>
<rect x="502" y="454" width="10" height="10" rx="2" fill="#444441"/>
<text x="518" y="464" fill="#c2c0b6" font-size="11">Pemilih</text>
</svg>