<svg width="100%" viewBox="0 0 640 560" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family:'Segoe UI',system-ui,sans-serif">
<title>Alur Bisnis Pemilihan Manual di Kelurahan</title>
<desc>Flowchart proses pemilihan RT/RW secara manual beserta kelemahan di setiap tahap</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="640" height="560" rx="12" fill="#1a1a2e"/>

<!-- Title -->
<text x="320" y="28" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Alur Pemilihan Manual di Kelurahan (Sebelum E-Voting)</text>

<!-- Step 1 -->
<rect x="180" y="45" width="260" height="48" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="310" y="64" text-anchor="middle" fill="#d3d1c7" font-size="13" font-weight="500">1. Pendataan warga (DPT)</text>
<text x="310" y="80" text-anchor="middle" fill="#b4b2a9" font-size="11">RT/RW kumpul data manual door-to-door</text>
<!-- Risk 1 -->
<rect x="456" y="51" width="168" height="36" rx="6" fill="#602a28" stroke="#cd5c58" stroke-width="0.5"/>
<text x="540" y="66" text-anchor="middle" fill="#e8a09d" font-size="11">🔴 Data duplikat,</text>
<text x="540" y="80" text-anchor="middle" fill="#e8a09d" font-size="11">warga pindah tak terdata</text>
<line x1="440" y1="69" x2="458" y2="69" stroke="#cd5c58" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="93" x2="310" y2="125" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<rect x="180" y="125" width="260" height="48" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="310" y="144" text-anchor="middle" fill="#d3d1c7" font-size="13" font-weight="500">2. Cetak surat suara</text>
<text x="310" y="160" text-anchor="middle" fill="#b4b2a9" font-size="11">Panitia cetak kertas suara sesuai DPT</text>
<!-- Risk 2 -->
<rect x="456" y="131" width="168" height="36" rx="6" fill="#602a28" stroke="#cd5c58" stroke-width="0.5"/>
<text x="540" y="146" text-anchor="middle" fill="#e8a09d" font-size="11">🔴 Biaya cetak,</text>
<text x="540" y="160" text-anchor="middle" fill="#e8a09d" font-size="11">kelebihan/kekurangan surat</text>
<line x1="440" y1="149" x2="458" y2="149" stroke="#cd5c58" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="173" x2="310" y2="205" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<rect x="180" y="205" width="260" height="48" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="310" y="224" text-anchor="middle" fill="#d3d1c7" font-size="13" font-weight="500">3. Verifikasi & coblos di TPS</text>
<text x="310" y="240" text-anchor="middle" fill="#b4b2a9" font-size="11">Cek KTP → terima surat → coblos di bilik</text>
<!-- Risk 3 -->
<rect x="456" y="211" width="168" height="36" rx="6" fill="#483a0f" stroke="#a87829" stroke-width="0.5"/>
<text x="540" y="226" text-anchor="middle" fill="#dbb86e" font-size="11">🟡 Antrian panjang,</text>
<text x="540" y="240" text-anchor="middle" fill="#dbb86e" font-size="11">proses lambat ~5 menit</text>
<line x1="440" y1="229" x2="458" y2="229" stroke="#a87829" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="253" x2="310" y2="285" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 4 -->
<rect x="180" y="285" width="260" height="48" rx="8" fill="#444441" stroke="#b4b2a9" stroke-width="0.5"/>
<text x="310" y="304" text-anchor="middle" fill="#d3d1c7" font-size="13" font-weight="500">4. Penghitungan suara manual</text>
<text x="310" y="320" text-anchor="middle" fill="#b4b2a9" font-size="11">Buka kotak → hitung satu per satu</text>
<!-- Risk 4 -->
<rect x="456" y="291" width="168" height="36" rx="6" fill="#602a28" stroke="#cd5c58" stroke-width="0.5"/>
<text x="540" y="306" text-anchor="middle" fill="#e8a09d" font-size="11">🔴 Salah hitung, surat</text>
<text x="540" y="320" text-anchor="middle" fill="#e8a09d" font-size="11">tidak sah diperdebatkan</text>
<line x1="440" y1="309" x2="458" y2="309" stroke="#cd5c58" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="333" x2="310" y2="365" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 5 -->
<rect x="180" y="365" width="260" height="48" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
<text x="310" y="384" text-anchor="middle" fill="#cecbf6" font-size="13" font-weight="500">5. Pengumuman hasil</text>
<text x="310" y="400" text-anchor="middle" fill="#afa9ec" font-size="11">Tulis di papan, umumkan lisan</text>
<!-- Risk 5 -->
<rect x="456" y="371" width="168" height="36" rx="6" fill="#602a28" stroke="#cd5c58" stroke-width="0.5"/>
<text x="540" y="386" text-anchor="middle" fill="#e8a09d" font-size="11">🔴 Tidak ada rekam</text>
<text x="540" y="400" text-anchor="middle" fill="#e8a09d" font-size="11">jejak, sulit diaudit</text>
<line x1="440" y1="389" x2="458" y2="389" stroke="#cd5c58" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Aktor column -->
<rect x="14" y="45" width="80" height="368" rx="6" fill="none" stroke="#dedcd1" stroke-width="0.3" opacity="0.2"/>
<text x="54" y="64" text-anchor="middle" fill="#c2c0b6" font-size="11">RT/RW</text>
<text x="54" y="149" text-anchor="middle" fill="#c2c0b6" font-size="11">Panitia</text>
<text x="54" y="229" text-anchor="middle" fill="#c2c0b6" font-size="11">Pemilih</text>
<text x="54" y="309" text-anchor="middle" fill="#c2c0b6" font-size="11">Panitia</text>
<text x="54" y="389" text-anchor="middle" fill="#c2c0b6" font-size="11">Lurah</text>
<line x1="94" y1="69" x2="180" y2="69" stroke="#dedcd1" stroke-width="0.3" stroke-dasharray="3 3" opacity="0.2"/>
<line x1="94" y1="149" x2="180" y2="149" stroke="#dedcd1" stroke-width="0.3" stroke-dasharray="3 3" opacity="0.2"/>
<line x1="94" y1="229" x2="180" y2="229" stroke="#dedcd1" stroke-width="0.3" stroke-dasharray="3 3" opacity="0.2"/>
<line x1="94" y1="309" x2="180" y2="309" stroke="#dedcd1" stroke-width="0.3" stroke-dasharray="3 3" opacity="0.2"/>
<line x1="94" y1="389" x2="180" y2="389" stroke="#dedcd1" stroke-width="0.3" stroke-dasharray="3 3" opacity="0.2"/>

<!-- Summary box -->
<rect x="20" y="440" width="600" height="50" rx="8" fill="#602a28" stroke="#cd5c58" stroke-width="0.3" opacity="0.6"/>
<text x="320" y="460" text-anchor="middle" fill="#e8a09d" font-size="12" font-weight="500">Kesimpulan: Proses manual memakan waktu 1 hari penuh, biaya Rp 2-5 juta,</text>
<text x="320" y="478" text-anchor="middle" fill="#e8a09d" font-size="12">partisipasi rendah (40-60%), dan tidak ada jejak audit digital</text>
</svg>