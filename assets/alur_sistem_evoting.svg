<svg width="100%" viewBox="0 0 640 580" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family:'Segoe UI',system-ui,sans-serif">
<title>Alur Sistem E-Voting Kelurahan</title>
<desc>Flowchart proses e-voting tingkat kelurahan dari verifikasi KTP hingga pengumuman hasil</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="640" height="580" rx="12" fill="#1a1a2e"/>

<!-- Title -->
<text x="320" y="28" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="600">Alur Sistem E-Voting Kelurahan (Usulan)</text>

<!-- Step 1 -->
<rect x="180" y="45" width="260" height="48" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="310" y="64" text-anchor="middle" fill="#9fe1cb" font-size="13" font-weight="500">1. Persiapan (H-7)</text>
<text x="310" y="80" text-anchor="middle" fill="#5dcaa5" font-size="11">Admin import data warga → DPT digital</text>
<!-- Benefit 1 -->
<rect x="456" y="51" width="172" height="36" rx="6" fill="#1b4614" stroke="#599130" stroke-width="0.5"/>
<text x="542" y="66" text-anchor="middle" fill="#b5dfa0" font-size="11">✅ Data valid, tidak ada</text>
<text x="542" y="80" text-anchor="middle" fill="#b5dfa0" font-size="11">duplikasi</text>
<line x1="440" y1="69" x2="458" y2="69" stroke="#599130" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="93" x2="310" y2="125" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 2 -->
<rect x="180" y="125" width="260" height="48" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
<text x="310" y="144" text-anchor="middle" fill="#9fe1cb" font-size="13" font-weight="500">2. Input kandidat</text>
<text x="310" y="160" text-anchor="middle" fill="#5dcaa5" font-size="11">Panitia masukkan nama, foto, visi-misi</text>
<!-- Benefit 2 -->
<rect x="456" y="131" width="172" height="36" rx="6" fill="#1b4614" stroke="#599130" stroke-width="0.5"/>
<text x="542" y="146" text-anchor="middle" fill="#b5dfa0" font-size="11">✅ Tanpa cetak surat,</text>
<text x="542" y="160" text-anchor="middle" fill="#b5dfa0" font-size="11">hemat biaya</text>
<line x1="440" y1="149" x2="458" y2="149" stroke="#599130" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="173" x2="310" y2="205" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 3 -->
<rect x="180" y="205" width="260" height="48" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="310" y="224" text-anchor="middle" fill="#b5d4f4" font-size="13" font-weight="500">3. Verifikasi pemilih</text>
<text x="310" y="240" text-anchor="middle" fill="#85b7eb" font-size="11">Petugas cek KTP → sistem validasi DPT</text>
<!-- Benefit 3 -->
<rect x="456" y="211" width="172" height="36" rx="6" fill="#1b4614" stroke="#599130" stroke-width="0.5"/>
<text x="542" y="226" text-anchor="middle" fill="#b5dfa0" font-size="11">✅ Cegah pemilih ganda</text>
<text x="542" y="240" text-anchor="middle" fill="#b5dfa0" font-size="11">secara otomatis</text>
<line x1="440" y1="229" x2="458" y2="229" stroke="#599130" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="253" x2="310" y2="285" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 4 -->
<rect x="180" y="285" width="260" height="48" rx="8" fill="#0c447c" stroke="#85b7eb" stroke-width="0.5"/>
<text x="310" y="304" text-anchor="middle" fill="#b5d4f4" font-size="13" font-weight="500">4. Voting digital</text>
<text x="310" y="320" text-anchor="middle" fill="#85b7eb" font-size="11">Pilih kandidat di tablet → konfirmasi</text>

<line x1="310" y1="333" x2="310" y2="365" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 5 -->
<rect x="180" y="365" width="260" height="48" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
<text x="310" y="384" text-anchor="middle" fill="#cecbf6" font-size="13" font-weight="500">5. Hitung otomatis</text>
<text x="310" y="400" text-anchor="middle" fill="#afa9ec" font-size="11">Hasil real-time di dashboard</text>
<!-- Benefit 5 -->
<rect x="456" y="371" width="172" height="36" rx="6" fill="#1b4614" stroke="#599130" stroke-width="0.5"/>
<text x="542" y="386" text-anchor="middle" fill="#b5dfa0" font-size="11">✅ Instan, tanpa</text>
<text x="542" y="400" text-anchor="middle" fill="#b5dfa0" font-size="11">human error</text>
<line x1="440" y1="389" x2="458" y2="389" stroke="#599130" stroke-width="0.5" stroke-dasharray="3 3"/>

<line x1="310" y1="413" x2="310" y2="445" stroke="#9c9a92" stroke-width="1.2" opacity="0.4" marker-end="url(#arrow)"/>

<!-- Step 6 -->
<rect x="180" y="445" width="260" height="48" rx="8" fill="#63380a" stroke="#ef9f27" stroke-width="0.5"/>
<text x="310" y="464" text-anchor="middle" fill="#fac775" font-size="13" font-weight="500">6. Pengumuman & cetak rekap</text>
<text x="310" y="480" text-anchor="middle" fill="#ef9f27" font-size="11">Lurah sahkan → rekap PDF → arsip</text>
<!-- Benefit 6 -->
<rect x="456" y="451" width="172" height="36" rx="6" fill="#1b4614" stroke="#599130" stroke-width="0.5"/>
<text x="542" y="466" text-anchor="middle" fill="#b5dfa0" font-size="11">✅ Audit trail digital</text>
<text x="542" y="480" text-anchor="middle" fill="#b5dfa0" font-size="11">lengkap tersimpan</text>
<line x1="440" y1="469" x2="458" y2="469" stroke="#599130" stroke-width="0.5" stroke-dasharray="3 3"/>

<!-- Summary box -->
<rect x="20" y="515" width="600" height="50" rx="8" fill="#1b4614" stroke="#599130" stroke-width="0.3" opacity="0.6"/>
<text x="320" y="535" text-anchor="middle" fill="#b5dfa0" font-size="12" font-weight="500">Keunggulan: Proses voting selesai ~2 menit/orang, biaya operasional Rp 500rb-1jt,</text>
<text x="320" y="553" text-anchor="middle" fill="#b5dfa0" font-size="12">hasil langsung tersedia, dan rekam jejak digital lengkap</text>
</svg>